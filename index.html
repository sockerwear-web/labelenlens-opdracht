<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Label &amp; Lens — Opdrachtbevestiging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
<style>
  :root{
    --green:#3f4f46; --green-d:#33403a; --green-l:#eef2ef; --ring:rgba(63,79,70,.15);
    --ink:#1f2937; --body:#475160; --muted:#8a93a0;
    --line:#e5e8ec; --line-2:#eef0f3; --bg:#f2f4f7; --card:#ffffff;
    --blue-l:#eaf0f9; --blue:#46618f;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--ink);background:var(--bg);line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:940px;margin:0 auto;padding:14px 20px 24px}

  .brandtop{text-align:center;padding:2px 0 12px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .brandtop .wm{font-family:"Cormorant Garamond",Georgia,serif;font-size:29px;font-weight:600;letter-spacing:4px;color:var(--green);line-height:1}
  .brandtop .wm small{display:block;font-family:"Inter",sans-serif;font-weight:600;font-size:9px;letter-spacing:6px;color:var(--muted);margin-top:5px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        padding:17px 20px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .card.tight{padding:12px 20px}
  .narrow{max-width:560px;margin-left:auto;margin-right:auto}

  .head{display:flex;justify-content:space-between;align-items:center;gap:14px}
  h1{font-size:17px;font-weight:600;letter-spacing:-.2px;margin:0;color:var(--ink)}
  h2{font-size:14.5px;font-weight:600;margin:0 0 11px;color:var(--ink)}
  .suby{color:var(--muted);font-size:12.5px;margin:2px 0 0}
  .pill{flex:0 0 auto;font-size:12px;font-weight:500;background:var(--blue-l);color:var(--blue);
        border-radius:999px;padding:6px 13px;white-space:nowrap}
  .pill.green{background:var(--green-l);color:var(--green)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
  .grid > .card{display:flex;flex-direction:column;margin-bottom:0}
  .grid > .card .btn:last-child{margin-top:auto}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}

  .group{margin-top:11px}
  .group:first-child{margin-top:0}
  label.fld{display:block;font-size:12px;font-weight:600;color:var(--body);margin:0 0 5px;letter-spacing:.1px}
  label.fld .opt{color:var(--muted);font-weight:450}
  input[type=text],input[type=email]{width:100%;font-size:15px;font-family:inherit;padding:10px 13px;
        border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:.15s}
  input::placeholder{color:#aab0b9}
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--ring)}
  .row{display:flex;gap:11px}
  .row>div{flex:1}

  .disc{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;
        padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:#fbfcfd;cursor:pointer;
        text-align:left;font-family:inherit;transition:.15s}
  .disc:hover{background:#f6f8fa;border-color:#d8dce2}
  .disc .t{font-size:13.5px;font-weight:600;color:var(--ink)}
  .disc .sub{font-weight:450;color:var(--muted);font-size:12px;margin-top:2px}
  .disc .chev{width:18px;height:18px;color:var(--muted);transition:transform .25s;flex:0 0 auto}
  .disc.open .chev{transform:rotate(180deg)}
  .panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .panel.open{max-height:1400px}
  .panel-in{padding:8px 2px 2px}
  .opt-row{display:flex;gap:10px;align-items:flex-start;padding:8px 4px;cursor:pointer;user-select:none}
  .opt-row input{width:18px;height:18px;margin:1px 0 0;flex:0 0 auto;accent-color:var(--green);cursor:pointer}
  .opt-row span{font-size:13px;color:var(--body)}
  .opt-row.indent{padding-left:24px}
  .opt-row.none{margin-top:6px;border-top:1px solid var(--line-2);padding-top:13px}

  /* Upload */
  .drop{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;padding:14px 14px;
        border:1.5px dashed #cfd5dc;border-radius:11px;background:#fbfcfd;cursor:pointer;color:var(--body);transition:.15s}
  .drop:hover{border-color:var(--green);background:#f6faf7}
  .drop.drag{border-color:var(--green);background:var(--green-l)}
  .drop svg{width:22px;height:22px;color:var(--green)}
  .drop b{color:var(--ink);font-weight:600}
  .drop .dhint{font-size:11.5px;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:#f1f4f7;border:1px solid var(--line);
        border-radius:8px;padding:6px 10px;font-size:12px;color:var(--body);max-width:100%}
  .chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
  .chip .rm{cursor:pointer;color:var(--muted);font-weight:700;line-height:1;font-size:14px}
  .chip .rm:hover{color:#c0392b}

  .alert{display:flex;gap:9px;align-items:flex-start;margin-bottom:11px;padding:10px 12px;border-radius:10px;
         background:#fdf6ec;border:1px solid #f2e2c4;font-size:12.5px;color:#7a5d2a}
  .alert svg{width:15px;height:15px;color:#b78a37;flex:0 0 auto;margin-top:1px}

  .sig-label{font-size:12px;font-weight:600;color:var(--body);margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
  .sig-label .clear{font-size:12.5px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
  .sig-label .clear:hover{color:var(--ink)}
  .sigbox{border:1px solid var(--line);border-radius:11px;position:relative;overflow:hidden;touch-action:none;background:#fff;flex:1 1 auto;min-height:210px}
  canvas{display:block;width:100%;height:100%;min-height:210px}
  .baseline{position:absolute;left:20px;right:20px;bottom:30px;border-bottom:1px solid #d2d6dc;pointer-events:none}
  .baseline::before{content:"\00d7";position:absolute;left:-1px;bottom:2px;color:#b4b9c1;font-size:12px}
  .sighint{position:absolute;left:0;right:0;bottom:38px;text-align:center;color:#b4b9c1;font-size:12.5px;pointer-events:none}
  .note{color:var(--muted);font-size:12px;margin-top:9px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:inherit;
       font-size:15px;font-weight:600;padding:14px;border:none;border-radius:11px;background:var(--green);color:#fff;
       cursor:pointer;transition:.15s}
  .btn:hover{background:var(--green-d)}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:16px;height:16px}
  .btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:550}
  .btn.sec:hover{background:#f6f8fa;border-color:#d8dce2}

  .banner{background:#e7f4ec;border:1px solid #c5e6d2;border-radius:12px;padding:14px 16px;font-size:14px;color:#256b41;margin-bottom:16px}
  .banner b{color:#17562f}
  .muted{color:var(--muted);font-size:12.5px}
  .err{color:#c0392b;font-size:13px;font-weight:550;margin-top:12px;display:none}
  .field-read{font-size:13px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfcfd;color:#3a4047}
  a.copy{word-break:break-all;color:var(--green);text-decoration:none}
  hr{border:none;border-top:1px solid var(--line-2);margin:18px 0}
  .foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:18px;line-height:1.7}
  .foot .sec{display:inline-flex;gap:5px;align-items:center}
  .foot .sec svg{width:12px;height:12px;color:var(--green)}
  .checkrow{display:flex;align-items:center;gap:10px}
  .checkdot{width:30px;height:30px;border-radius:50%;background:var(--green-l);display:grid;place-items:center;flex:0 0 auto}
  .checkdot svg{width:17px;height:17px;stroke:var(--green);stroke-width:3;fill:none}
  .center{text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ===== INSTELLING — hier komen de getekende PDF's binnen =====
   De mail loopt via FormSubmit (gratis, bijlagen toegestaan, geen registratie).
   Bij de allereerste inzending stuurt FormSubmit één activatiemail naar dit adres:
   even die link aanklikken, daarna komt alles automatisch met PDF binnen. */
var ADVISEUR_EMAIL = "info@labelenlens.nl";
/* ============================================================ */

const CHECKLIST = [
  {k:"facturen",        t:"Facturen t.b.v. isolatie, verbouwingen, installaties en/of zonnepanelen"},
  {k:"bouwtek",         t:"Bouwkundige tekeningen op schaal met afmetingen"},
  {k:"plattegronden",   t:"Met plattegronden", indent:true},
  {k:"gevel",           t:"Gevelaanzichten", indent:true},
  {k:"doorsnede",       t:"Dwarsdoorsnede", indent:true},
  {k:"detailtek",       t:"Detailtekeningen van de bouwkundige constructies van het gebouw"},
  {k:"installontw",     t:"Installatieontwerp en/of ontwerp- en installatietekeningen (verwarming, koeling en warmtapwater)"},
  {k:"aanvraagverg",    t:"Aanvraag bouwvergunning inclusief Energieprestatieberekening"},
  {k:"verleendverg",    t:"Verleende bouwvergunning"},
  {k:"inregeling",      t:"Verklaring dat de installaties voor ruimteverwarming/tapwater/ruimtekoeling zijn ingeregeld"},
  {k:"lijstinstall",    t:"Verzamellijsten met de installaties (bijv. type opwekkers voor verwarming/tapwater/koeling)"},
  {k:"lijstkozijn",     t:"Verzamellijsten met type kozijnen/beglazing"},
];
var PEN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3 0 0-3z"/><path d="M18 13l-1.5-1.5"/><path d="M2 19s3-1 5-3 4.5-7 4.5-7"/></svg>';
var INFO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5v.01"/></svg>';
var CHEV_SVG = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
var SHIELD_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg>';
var UP_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 20h16"/></svg>';

function b64enc(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}
function b64dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))));}
function param(n){return new URLSearchParams(location.search).get(n);}
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function isImage(f){return /^image\//.test(f.type)||/\.(jpe?g|png|webp)$/i.test(f.name);}

var app = document.getElementById("app");
var brandtop = '<div class="brandtop"><div class="wm">LABEL &amp; LENS<small>VASTGOED</small></div></div>';
var foot = '<div class="foot"><div class="sec">'+SHIELD_SVG+'Beveiligde omgeving · Label &amp; Lens Vastgoed</div></div>';

function boot(){
  if(boot._done) return; boot._done = true;
  var data = param("w");
  if(data){ try{ renderSign(b64dec(data)); }catch(e){ renderError(); } }
  else { renderAdmin(); }
}
if(document.readyState === "loading"){ document.addEventListener("DOMContentLoaded", boot); }
else { boot(); }

function renderAdmin(){
  app.innerHTML = brandtop
  + '<div class="card narrow">'
  +   '<h1>Nieuwe opdracht</h1>'
  +   '<p class="suby">Vul het adres van de opname in. Je krijgt een persoonlijke link voor de opdrachtgever.</p>'
  +   '<div style="margin-top:16px"><label class="fld">Adres opname energielabel</label><input id="adres" type="text" placeholder="Straat en huisnummer"></div>'
  +   '<div class="row group"><div><label class="fld">Postcode <span class="opt">— optioneel</span></label><input id="postcode" type="text" placeholder="1234 AB"></div>'
  +     '<div><label class="fld">Woonplaats <span class="opt">— optioneel</span></label><input id="woonplaats" type="text" placeholder="Amsterdam"></div></div>'
  +   '<div class="row group"><div><label class="fld">E-mail opdrachtgever <span class="opt">— optioneel</span></label><input id="email" type="email" placeholder="naam@makelaar.nl"></div>'
  +     '<div><label class="fld">Jouw e-mail <span class="opt">— voor de kopie</span></label><input id="adviseur" type="email" placeholder="info@labelenlens.nl"></div></div>'
  +   '<div class="err" id="err">Vul minimaal het adres in.</div>'
  +   '<button class="btn" id="gen" style="margin-top:18px">Genereer link</button>'
  +   '<div id="out"></div>'
  + '</div>' + foot;

  function renderLinkOut(url){
    document.getElementById("out").innerHTML =
        '<hr><label class="fld">Persoonlijke link</label>'
      + '<div class="field-read"><a class="copy" href="'+esc(url)+'">'+esc(url)+'</a></div>'
      + '<div class="row" style="margin-top:12px"><div><button class="btn" id="copy">Kopieer link</button></div>'
      + '<div><a class="btn sec" href="'+esc(url)+'" target="_blank">Open (voorbeeld)</a></div></div>';
    document.getElementById("copy").onclick = function(){
      navigator.clipboard.writeText(url).then(function(){ document.getElementById("copy").textContent="Gekopieerd"; })
        .catch(function(){ prompt("Kopieer de link:", url); });
    };
  }
  document.getElementById("gen").onclick = function(){
    var adres = val("adres");
    if(!adres){ show("err"); return; }
    var payload = {a:adres, p:val("postcode"), w:val("woonplaats"), e:val("email"), adv:val("adviseur")};
    var url = location.origin + location.pathname + "?w=" + encodeURIComponent(b64enc(payload));
    renderLinkOut(url);
  };
}

var signaturePad=null, uploaded=[];
function renderSign(d){
  uploaded = [];
  var addr = d.a || "Energielabel";
  var sub = [d.p, d.w].filter(Boolean).join(" ");
  var rows = CHECKLIST.map(function(c){
    return '<label class="opt-row '+(c.indent?'indent':'')+'"><input type="checkbox" data-k="'+c.k+'"><span>'+esc(c.t)+'</span></label>';
  }).join("");
  app.innerHTML = brandtop
  + '<div class="card tight"><div class="head"><div>'
  +   '<h1>Opdrachtbevestiging — '+esc(addr)+'</h1>'
  +   '<p class="suby">'+(sub?esc(sub)+' · ':'')+'Energielabel</p>'
  + '</div><span class="pill">Te ondertekenen</span></div></div>'
  + '<div class="grid">'
  +   '<div class="card"><h2>Uw gegevens</h2>'
  +     '<div class="group"><label class="fld">Naam opdrachtgever</label><input id="naam" type="text" placeholder="Voor- en achternaam"></div>'
  +     '<div class="group"><label class="fld">Bedrijfsnaam <span class="opt">— optioneel</span></label><input id="bedrijf" type="text" placeholder="Makelaarskantoor"></div>'
  +     '<div class="group"><label class="fld">Adres opname energielabel</label><input id="adres" type="text" value="'+esc(d.a||"")+'"></div>'
  +     '<div class="row group"><div><label class="fld">Postcode</label><input id="postcode" type="text" value="'+esc(d.p||"")+'"></div>'
  +       '<div><label class="fld">Woonplaats</label><input id="woonplaats" type="text" value="'+esc(d.w||"")+'"></div></div>'
  +     '<button class="disc" id="disc" type="button"><span><span class="t">Beschikbare informatie toevoegen</span><span class="sub">Optioneel — helpt de adviseur</span></span>'+CHEV_SVG+'</button>'
  +     '<div class="panel" id="panel"><div class="panel-in">'+rows
  +       '<label class="opt-row none"><input type="checkbox" id="geen"><span>Geen van bovenstaande informatie beschikbaar.</span></label>'
  +     '</div></div>'
  +     '<div class="group"><label class="fld">Documenten toevoegen <span class="opt">— optioneel (PDF, JPG, PNG)</span></label>'
  +       '<label class="drop" id="drop"><input id="files" type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.webp" style="display:none">'
  +       UP_SVG+'<span><b>Kies bestanden</b> of sleep ze hierheen</span>'
  +       '<span class="dhint">Bijv. bouwtekeningen of facturen · max 15 MB per bestand</span></label>'
  +       '<div class="chips" id="chips"></div></div>'
  +   '</div>'
  +   '<div class="card"><h2>Ondertekenen</h2>'
  +     '<div class="alert">'+INFO_SVG+'<span>Zonder ondertekening kan uw energielabel niet worden afgemeld.</span></div>'
  +     '<div class="sig-label"><span>Uw handtekening</span><button class="clear" id="clear" type="button">Wissen</button></div>'
  +     '<div class="sigbox"><canvas id="sig"></canvas><div class="baseline"></div><div class="sighint" id="hint">Teken hier met vinger of muis</div></div>'
  +     '<p class="note">De datum wordt automatisch ingevuld bij ondertekenen.</p>'
  +     '<div class="err" id="err"></div>'
  +     '<button class="btn" id="submit" style="margin-top:16px">'+PEN_SVG+'Onderteken &amp; verstuur</button>'
  +   '</div>'
  + '</div>' + foot;

  var disc = document.getElementById("disc"), panel = document.getElementById("panel");
  disc.onclick = function(){ disc.classList.toggle("open"); panel.classList.toggle("open"); };

  var fileInput = document.getElementById("files"), drop = document.getElementById("drop"), chips = document.getElementById("chips");
  fileInput.addEventListener("change", function(e){ addFiles(e.target.files); fileInput.value=""; });
  ["dragenter","dragover"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add("drag"); }); });
  ["dragleave","dragend"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove("drag"); }); });
  drop.addEventListener("drop", function(e){ e.preventDefault(); drop.classList.remove("drag"); if(e.dataTransfer&&e.dataTransfer.files) addFiles(e.dataTransfer.files); });
  function addFiles(list){
    Array.prototype.forEach.call(list, function(f){
      if(f.size > 15*1024*1024){ alert('"'+f.name+'" is groter dan 15 MB en is overgeslagen.'); return; }
      uploaded.push(f);
    });
    renderChips(chips);
  }

  var canvas = document.getElementById("sig");
  resizeCanvas(canvas);
  window.addEventListener("resize", function(){ resizeCanvas(canvas); });
  signaturePad = new SignaturePad(canvas,{penColor:"#1f2937",minWidth:0.9,maxWidth:2.4,velocityFilterWeight:.6});
  requestAnimationFrame(function(){ resizeCanvas(canvas); });
  signaturePad.addEventListener("beginStroke", function(){ document.getElementById("hint").style.display="none"; });
  document.getElementById("clear").onclick = function(){ signaturePad.clear(); document.getElementById("hint").style.display="block"; };

  document.getElementById("geen").addEventListener("change", function(e){
    if(e.target.checked) document.querySelectorAll('#panel input[data-k]').forEach(function(i){ i.checked=false; });
  });
  document.querySelectorAll('#panel input[data-k]').forEach(function(i){
    i.addEventListener("change", function(e){ if(e.target.checked) document.getElementById("geen").checked=false; });
  });

  document.getElementById("submit").onclick = function(){ onSubmit(d); };
}

function renderChips(chips){
  chips.innerHTML = uploaded.map(function(f,i){
    return '<span class="chip"><span class="nm">'+esc(f.name)+'</span><span class="rm" data-i="'+i+'">×</span></span>';
  }).join("");
  chips.querySelectorAll(".rm").forEach(function(x){
    x.onclick = function(){ uploaded.splice(parseInt(x.dataset.i,10),1); renderChips(chips); };
  });
}

function onSubmit(d){
  var err = document.getElementById("err");
  var naam = val("naam"), adres = val("adres");
  if(!naam){ return fail(err,"Vul uw naam in."); }
  if(!adres){ return fail(err,"Vul het adres in."); }
  if(!signaturePad || signaturePad.isEmpty()){ return fail(err,"Plaats uw handtekening."); }

  var checked = {};
  document.querySelectorAll('#panel input[data-k]').forEach(function(i){ if(i.checked) checked[i.dataset.k]=true; });
  var geen = document.getElementById("geen").checked;
  var now = new Date();
  var record = {
    naam:naam, bedrijf:val("bedrijf"), adres:adres, postcode:val("postcode"), woonplaats:val("woonplaats"),
    checked:checked, geen:geen, datum: now.toLocaleDateString("nl-NL"),
    tijd: now.toLocaleString("nl-NL",{hour:"2-digit",minute:"2-digit"}),
    sig: signaturePad.toDataURL("image/png"),
    replyto: (d && d.e) ? d.e : "",
    files: uploaded.map(function(f){ return f.name; })
  };
  var btn = document.getElementById("submit");
  btn.innerHTML = "Bezig met verzenden…"; btn.disabled = true;
  readImages(uploaded, function(imgs){
    var fname = "Opdrachtbevestiging_" + (adres.replace(/[^a-z0-9]+/gi,"_")) + ".pdf";
    buildPDF(record, imgs).then(function(pdfBlob){
      try{ submitToFormSubmit(record, fname, pdfBlob); }catch(e){}
      try{ renderDone(record, fname, true); }
      catch(e){ alert("Ondertekend, maar het scherm kon niet worden ververst."); }
    }).catch(function(e){
      btn.disabled=false; btn.innerHTML="Onderteken & verstuur";
      fail(document.getElementById("err"), "Er ging iets mis bij het maken van de PDF. Probeer het opnieuw.");
    });
  });
}

function checklistSummary(r){
  var lines = [];
  CHECKLIST.forEach(function(c){ if(r.checked[c.k]) lines.push("- "+c.t); });
  if(r.geen) lines.push("- Geen van bovenstaande informatie beschikbaar.");
  return lines.length ? lines.join("\n") : "Geen informatie aangevinkt.";
}

function submitToFormSubmit(r, fname, pdfBlob){
  // FormSubmit vereist een echte multipart form-POST voor bijlagen.
  // We posten naar een verborgen iframe zodat de pagina niet wegnavigeert.
  var iframe = document.createElement("iframe");
  iframe.name = "fs_target_" + Date.now();
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  var form = document.createElement("form");
  form.action = "https://formsubmit.co/" + ADVISEUR_EMAIL;
  form.method = "POST";
  form.enctype = "multipart/form-data";
  form.target = iframe.name;
  form.style.display = "none";

  function hidden(n, v){ var i=document.createElement("input"); i.type="hidden"; i.name=n; i.value=v; form.appendChild(i); }
  function fileField(n, file){
    try{ var fi=document.createElement("input"); fi.type="file"; fi.name=n;
      var dt=new DataTransfer(); dt.items.add(file); fi.files=dt.files; form.appendChild(fi); return true;
    }catch(e){ return false; }
  }

  hidden("_subject", "Getekende opdrachtbevestiging — " + r.adres);
  hidden("_template", "table");
  hidden("_captcha", "false");
  if(/@/.test(r.replyto)) hidden("_replyto", r.replyto);
  hidden("Opdrachtgever", r.naam + (r.bedrijf ? (" ("+r.bedrijf+")") : ""));
  hidden("Adres opname", r.adres);
  hidden("Postcode en woonplaats", (r.postcode+" "+r.woonplaats).trim());
  hidden("Ondertekend op", r.datum+" "+r.tijd);
  hidden("Beschikbare informatie", checklistSummary(r));
  hidden("Meegestuurde documenten", r.files.length ? r.files.join(", ") : "geen");

  var total = 0;
  if(pdfBlob){ fileField("attachment", new File([pdfBlob], fname, {type:"application/pdf"})); total += pdfBlob.size; }
  uploaded.forEach(function(f, i){ if(total + f.size < 9.5*1024*1024){ if(fileField("bijlage_"+(i+1), f)) total += f.size; } });

  document.body.appendChild(form);
  form.submit();
  setTimeout(function(){ try{ form.remove(); }catch(e){} }, 4000);
}

function renderDone(r, fname, sent){
  var subject = encodeURIComponent("Getekende opdrachtbevestiging — " + r.adres);
  var filesLine = r.files.length ? ("\nBijgevoegde documenten: "+r.files.join(", ")+" (afbeeldingen zitten in de PDF).") : "";
  var body = encodeURIComponent(
    "Opdrachtbevestiging ondertekend.\n\nOpdrachtgever: "+r.naam+(r.bedrijf?(" ("+r.bedrijf+")"):"")
    + "\nAdres: "+r.adres+"\nPostcode/plaats: "+r.postcode+" "+r.woonplaats
    + "\nDatum: "+r.datum+" "+r.tijd+filesLine
    + "\n\nDe getekende PDF ('"+fname+"') is gedownload — voeg deze toe als bijlage.");
  var mail = "mailto:"+encodeURIComponent(ADVISEUR_EMAIL)+"?subject="+subject+"&body="+body;

  var statusCard;
  if(sent){
    statusCard = '<div class="card"><div class="checkrow"><div class="checkdot"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
      + '<div><div style="font-weight:600;font-size:14px">Verzonden naar de adviseur</div>'
      + '<div class="muted">De getekende PDF is automatisch gemaild naar '+esc(ADVISEUR_EMAIL)+'. U heeft zelf ook een kopie gedownload.</div></div></div></div>';
  } else {
    statusCard = '<div class="card"><div class="checkrow"><div class="checkdot"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
      + '<div><div style="font-weight:600;font-size:14px">Rechtsgeldig ondertekend</div>'
      + '<div class="muted">De PDF is opgeslagen. Verstuur hem met de knop hieronder naar de adviseur.</div></div></div>'
      + '<a class="btn" href="'+mail+'" style="margin-top:16px">Stuur naar de adviseur</a></div>';
  }

  var docList = '<div class="field-read">'+esc(fname)+'</div>';
  if(r.files.length){
    docList += '<p class="muted" style="margin:10px 0 4px">Toegevoegde documenten:</p>'
      + '<div class="chips">'+r.files.map(function(n){ return '<span class="chip"><span class="nm">'+esc(n)+'</span></span>'; }).join("")+'</div>';
  }
  app.innerHTML = brandtop
  + '<div class="banner"><b>Bedankt '+esc(r.naam)+'!</b> U bent akkoord gegaan op '+esc(r.datum)+' '+esc(r.tijd)+'.</div>'
  + '<div class="card tight"><div class="head"><div>'
  +   '<h1>Opdrachtbevestiging — '+esc(r.adres)+'</h1>'
  +   '<p class="suby">'+[r.postcode,r.woonplaats].filter(Boolean).join(" ")+'</p>'
  + '</div><span class="pill green">Ondertekend</span></div></div>'
  + '<div class="grid">'
  +   statusCard
  +   '<div class="card"><h2>Document &amp; bijlagen</h2>'+docList+'</div>'
  + '</div>' + foot;
  window.scrollTo({top:0,behavior:"smooth"});
}

function readImages(files, cb){
  var imgs = [];
  var imageFiles = files.filter(isImage);
  if(imageFiles.length === 0){ cb(imgs); return; }
  var pending = imageFiles.length;
  imageFiles.forEach(function(f){
    var fr = new FileReader();
    fr.onload = function(){ imgs.push({name:f.name, data:fr.result}); if(--pending===0) cb(imgs); };
    fr.onerror = function(){ if(--pending===0) cb(imgs); };
    fr.readAsDataURL(f);
  });
}

function b64ToBytes(b64){ var bin=atob(b64); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
function dataURLToBytes(d){ return b64ToBytes(d.split(",")[1]); }

/* posities opgemeten in de blanco-PDF (pdfplumber, top-links); pdf-lib y = H - top */
var FIELD = { naam:[116,471], adres:[161,487], postcode:[95,503], woonplaats:[105,519], datum:[436,586] };
var CHECKPOS = {
  facturen:[54,201], bouwtek:[54,213], plattegronden:[67,224], gevel:[67,235], doorsnede:[67,245],
  detailtek:[54,257], installontw:[54,268], aanvraagverg:[54,290], verleendverg:[54,303],
  inregeling:[54,315], lijstinstall:[54,337], lijstkozijn:[54,350], geen:[53,396]
};

async function buildPDF(r, imgs){
  imgs = imgs || [];
  var L = window.PDFLib;
  var pdfDoc = await L.PDFDocument.load(b64ToBytes(BLANK_PDF_B64));
  var page = pdfDoc.getPages()[0];
  var H = page.getHeight(), Wd = page.getWidth();
  var font = await pdfDoc.embedFont(L.StandardFonts.Helvetica);
  var ink = L.rgb(0.10,0.12,0.14), green = L.rgb(0.247,0.31,0.275), grey = L.rgb(0.58,0.60,0.58);
  function txt(s,x,topB,size){ if(s===undefined||s===null||s==="") return; page.drawText(String(s), {x:x, y:H-topB, size:size||9, font:font, color:ink}); }
  txt(r.naam + (r.bedrijf?("  ("+r.bedrijf+")"):""), FIELD.naam[0], FIELD.naam[1]);
  txt(r.adres, FIELD.adres[0], FIELD.adres[1]);
  txt(r.postcode, FIELD.postcode[0], FIELD.postcode[1]);
  txt(r.woonplaats, FIELD.woonplaats[0], FIELD.woonplaats[1]);
  txt(r.datum, FIELD.datum[0], FIELD.datum[1]);

  function check(x0, top){
    page.drawLine({start:{x:x0+0.6,y:H-(top+5.2)}, end:{x:x0+2.1,y:H-(top+7.4)}, thickness:1.2, color:green});
    page.drawLine({start:{x:x0+2.1,y:H-(top+7.4)}, end:{x:x0+5.2,y:H-(top+1.6)}, thickness:1.2, color:green});
  }
  Object.keys(CHECKPOS).forEach(function(k){
    var sel = (k==="geen") ? r.geen : !!r.checked[k];
    if(sel){ check(CHECKPOS[k][0], CHECKPOS[k][1]); }
  });

  try{
    var png = await pdfDoc.embedPng(dataURLToBytes(r.sig));
    var d = png.scale(1); var maxW=150, maxH=44; var sc=Math.min(maxW/d.width, maxH/d.height);
    var w=d.width*sc, h=d.height*sc;
    page.drawImage(png, {x:54, y:H-(570+h), width:w, height:h});
  }catch(e){}

  if(r.files && r.files.length){
    page.drawText("Bijgevoegde documenten: "+r.files.join(", "), {x:54, y:34, size:6.5, font:font, color:grey, maxWidth:Wd-108});
  }
  page.drawText("Digitaal ondertekend via Label & Lens · "+new Date().toLocaleString("nl-NL"), {x:54, y:24, size:6.5, font:font, color:grey});

  for(var i=0;i<imgs.length;i++){
    var im=imgs[i];
    try{
      var bytes=dataURLToBytes(im.data);
      var img = /image\/png/i.test(im.data) ? await pdfDoc.embedPng(bytes) : await pdfDoc.embedJpg(bytes);
      var pg=pdfDoc.addPage([Wd,H]);
      pg.drawText("Bijlage: "+im.name, {x:40, y:H-40, size:10, font:font, color:ink});
      var dd=img.scale(1); var mW=Wd-80, mH=H-90; var s2=Math.min(mW/dd.width, mH/dd.height);
      var iw=dd.width*s2, ih=dd.height*s2;
      pg.drawImage(img, {x:(Wd-iw)/2, y:H-60-ih, width:iw, height:ih});
    }catch(e){}
  }

  var outBytes = await pdfDoc.save();
  return new Blob([outBytes], {type:"application/pdf"});
}

function val(id){var el=document.getElementById(id);return el?el.value.trim():"";}
function show(id){document.getElementById(id).style.display="block";}
function fail(el,msg){el.textContent=msg;el.style.display="block";el.scrollIntoView({block:"center",behavior:"smooth"});}
function resizeCanvas(c){var ratio=Math.max(window.devicePixelRatio||1,1);var r=c.getBoundingClientRect();
  c.width=Math.max(1,r.width*ratio);c.height=Math.max(1,(r.height||210)*ratio);var ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(ratio,ratio);
  if(signaturePad) signaturePad.clear();}
function renderError(){app.innerHTML=brandtop+'<div class="card narrow center"><h1>Link ongeldig</h1><p class="suby">Deze link is niet (meer) geldig. Vraag de adviseur om een nieuwe link.</p></div>'+foot;}
