<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Label &amp; Lens — Opdrachtbevestiging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
<style>
  :root{--green:#3f4f46;--green-d:#33403a;--green-l:#eef2ef;--ring:rgba(63,79,70,.15);--ink:#1f2937;--body:#475160;--muted:#8a93a0;--line:#e5e8ec;--line-2:#eef0f3;--bg:#f2f4f7;--card:#fff;--blue-l:#eaf0f9;--blue:#46618f;--radius:14px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  .wrap{max-width:960px;margin:0 auto;padding:22px 16px 48px}
  .brandtop{text-align:center;padding:6px 0 16px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .wm{font-family:"Cormorant Garamond",Georgia,serif;font-size:27px;font-weight:600;letter-spacing:4px;color:var(--green);line-height:1}
  .wm small{display:block;font-weight:600;font-size:8.5px;letter-spacing:6px;color:var(--muted);margin-top:5px;font-family:"Inter"}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .narrow{max-width:520px;margin:0 auto}
  h1{font-size:20px;font-weight:650;margin:0 0 4px}h2{font-size:15px;font-weight:650;margin:0 0 12px}
  .lead{color:var(--muted);font-size:13.5px;margin:0 0 4px}
  label.fld{display:block;font-size:12px;font-weight:600;color:var(--body);margin:14px 0 6px}
  label.fld .opt{color:var(--muted);font-weight:450}
  input{width:100%;font-size:15px;font-family:inherit;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:.15s}
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--ring)}
  .row{display:flex;gap:11px}.row>div{flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;border-radius:11px;background:var(--green);color:#fff;cursor:pointer;transition:.15s;margin-top:16px}
  .btn:hover{background:var(--green-d)}.btn:active{transform:translateY(1px)}.btn[disabled]{opacity:.6;cursor:default}
  .btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:550}
  .muted{color:var(--muted);font-size:12.5px}
  .err{color:#c0392b;font-size:13px;font-weight:550;margin-top:10px;display:none}
  .ok{background:#e7f4ec;border:1px solid #c5e6d2;color:#256b41;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:14px}
  .field-read{font-size:13px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfcfd;color:#3a4047;word-break:break-all}
  a.copy{color:var(--green);text-decoration:none}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:8px 8px;border-bottom:1px solid var(--line)}
  td{padding:10px 8px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  .pill{display:inline-block;font-size:11px;font-weight:500;border-radius:999px;padding:3px 9px;white-space:nowrap}
  .pill.concept{background:#eef0f3;color:#6b7280}.pill.verzonden{background:var(--blue-l);color:var(--blue)}
  .pill.geopend{background:#fff4e5;color:#b7791f}.pill.ondertekend{background:var(--green-l);color:var(--green)}
  .mini{font-size:12px;font-weight:600;color:var(--green);background:none;border:none;cursor:pointer;padding:0;margin-right:12px}
  .mini:hover{text-decoration:underline}
  .alert{display:flex;gap:9px;align-items:flex-start;margin:14px 0;padding:11px 13px;border-radius:10px;background:#fdf6ec;border:1px solid #f2e2c4;font-size:12.5px;color:#7a5d2a}
  .disc{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:#fbfcfd;cursor:pointer;text-align:left;font-family:inherit}
  .disc .t{font-size:13.5px;font-weight:600}.disc .sub{font-weight:450;color:var(--muted);font-size:12px;margin-top:2px}
  .chev{width:18px;height:18px;color:var(--muted);transition:transform .25s}.disc.open .chev{transform:rotate(180deg)}
  .panel{max-height:0;overflow:hidden;transition:max-height .3s ease}.panel.open{max-height:1400px}
  .opt-row{display:flex;gap:10px;align-items:flex-start;padding:8px 2px;cursor:pointer}
  .opt-row input{width:18px;height:18px;flex:0 0 auto;accent-color:var(--green);margin-top:1px}
  .opt-row span{font-size:13px;color:var(--body)}
  .opt-row.none{margin-top:6px;border-top:1px solid var(--line-2);padding-top:13px}
  .sigbox{border:1px solid var(--line);border-radius:11px;background:#fff;position:relative;overflow:hidden;touch-action:none;margin-top:8px}
  canvas{display:block;width:100%;height:200px}
  .baseline{position:absolute;left:20px;right:20px;bottom:30px;border-bottom:1px solid #d2d6dc;pointer-events:none}
  .sighint{position:absolute;left:0;right:0;bottom:38px;text-align:center;color:#b4b9c1;font-size:13px;pointer-events:none}
  .clear{font-size:12.5px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;float:right}
  .center{text-align:center}.spin{color:var(--muted);font-size:13px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="spin">Laden…</div></div>
<script>
var API='/api/app';
var CHECKLIST=[
 {k:"facturen",t:"Facturen t.b.v. isolatie, verbouwingen, installaties en/of zonnepanelen"},
 {k:"bouwtek",t:"Bouwkundige tekeningen op schaal met afmetingen"},
 {k:"plattegronden",t:"Met plattegronden",indent:true},
 {k:"gevel",t:"Gevelaanzichten",indent:true},
 {k:"doorsnede",t:"Dwarsdoorsnede",indent:true},
 {k:"detailtek",t:"Detailtekeningen van de bouwkundige constructies van het gebouw"},
 {k:"installontw",t:"Installatieontwerp en/of ontwerp- en installatietekeningen (verwarming, koeling en warmtapwater)"},
 {k:"aanvraagverg",t:"Aanvraag bouwvergunning inclusief Energieprestatieberekening"},
 {k:"verleendverg",t:"Verleende bouwvergunning"},
 {k:"inregeling",t:"Verklaring dat de installaties voor ruimteverwarming/tapwater/ruimtekoeling zijn ingeregeld"},
 {k:"lijstinstall",t:"Verzamellijsten met de installaties (bijv. type opwekkers voor verwarming/tapwater/koeling)"},
 {k:"lijstkozijn",t:"Verzamellijsten met type kozijnen/beglazing"}
];
var CHEV='<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
var app=document.getElementById('app');
var brand='<div class="brandtop"><div class="wm">LABEL &amp; LENS<small>VASTGOED</small></div></div>';
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function api(action,opts){opts=opts||{};return fetch(API+'?action='+action,{method:opts.method||'GET',headers:opts.body?{'Content-Type':'application/json'}:{},body:opts.body?JSON.stringify(opts.body):undefined,credentials:'same-origin'}).then(function(r){return r.json().then(function(j){return {status:r.status,json:j};});});}

var parts=location.pathname.split('/').filter(Boolean);
if(parts[0]==='woning'&&parts[1]) renderSign(parts[1].toUpperCase());
else renderDashboard();

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  api('me').then(function(r){ if(r.json&&r.json.authed) renderAdmin(); else renderLogin(); }).catch(renderLogin);
}
function renderLogin(){
  app.innerHTML=brand+'<div class="card narrow"><h1>Inloggen</h1><p class="lead">Adviseur-dashboard van Label &amp; Lens.</p>'
   +'<label class="fld">Wachtwoord</label><input id="pw" type="password" placeholder="••••••••">'
   +'<div class="err" id="err"></div><button class="btn" id="go">Inloggen</button></div>';
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==="Enter")doLogin();});
  document.getElementById('go').onclick=doLogin;
}
function doLogin(){
  var pw=document.getElementById('pw').value;var b=document.getElementById('go');b.disabled=true;b.textContent='Bezig…';
  api('login',{method:'POST',body:{password:pw}}).then(function(r){
    if(r.status===200) renderAdmin();
    else{ b.disabled=false;b.textContent='Inloggen'; var e=document.getElementById('err'); e.textContent=(r.json&&r.json.error)||'Mislukt'; e.style.display='block'; }
  });
}
function renderAdmin(){
  app.innerHTML=brand
   +'<div class="card narrow"><h1>Nieuwe opdracht</h1><p class="lead">Vul het adres in en het e-mailadres van de opdrachtgever. De link wordt automatisch gemaild.</p>'
   +'<label class="fld">Adres opname energielabel</label><input id="adres" type="text" placeholder="Straat en huisnummer">'
   +'<div class="row"><div><label class="fld">Postcode <span class="opt">— optioneel</span></label><input id="postcode" type="text" placeholder="1234 AB"></div>'
   +'<div><label class="fld">Woonplaats <span class="opt">— optioneel</span></label><input id="woonplaats" type="text" placeholder="Amsterdam"></div></div>'
   +'<label class="fld">E-mail opdrachtgever</label><input id="email" type="email" placeholder="naam@makelaar.nl">'
   +'<div class="err" id="err">Vul minimaal het adres in.</div><button class="btn" id="gen">Genereer link &amp; verstuur</button><div id="out"></div></div>'
   +'<div class="card"><h2>Opdrachten</h2><div id="list"><div class="spin">Laden…</div></div></div>';
  document.getElementById('gen').onclick=createOrder;
  loadList();
}
function createOrder(){
  var adres=val('adres'); if(!adres){show('err');return;}
  var b=document.getElementById('gen');b.disabled=true;b.textContent='Bezig…';
  api('create',{method:'POST',body:{adres:adres,postcode:val('postcode'),woonplaats:val('woonplaats'),email:val('email')}}).then(function(r){
    b.disabled=false;b.textContent='Genereer link & verstuur';
    if(r.status!==200){ var e=document.getElementById('err');e.textContent=(r.json&&r.json.error)||'Mislukt';e.style.display='block';return; }
    var j=r.json;
    document.getElementById('out').innerHTML='<div class="ok">'+(j.mailed?('Link gemaild naar '+esc(val('email'))+' ✓'):'Link aangemaakt.')+'</div>'
      +'<label class="fld">Persoonlijke link</label><div class="field-read"><a class="copy" href="'+esc(j.url)+'" target="_blank">'+esc(j.url)+'</a></div>'
      +'<button class="btn sec" id="cp">Kopieer link</button>';
    document.getElementById('cp').onclick=function(){navigator.clipboard.writeText(j.url).then(function(){document.getElementById('cp').textContent='Gekopieerd';});};
    ['adres','postcode','woonplaats','email'].forEach(function(id){document.getElementById(id).value='';});
    loadList();
  });
}
function loadList(){
  api('list').then(function(r){
    var el=document.getElementById('list'); if(!el)return;
    var o=(r.json&&r.json.orders)||[];
    if(!o.length){el.innerHTML='<p class="muted">Nog geen opdrachten.</p>';return;}
    var rows=o.map(function(x){
      var url=location.origin+'/woning/'+x.code;
      return '<tr><td><b>'+esc(x.adres)+'</b><div class="muted">'+esc((x.postcode||'')+' '+(x.woonplaats||''))+'</div></td>'
        +'<td><span class="pill '+x.status+'">'+x.status+'</span></td>'
        +'<td>'+esc(x.opdrachtgever_email||'')+(x.naam?'<div class="muted">'+esc(x.naam)+'</div>':'')+'</td>'
        +'<td style="text-align:right;white-space:nowrap">'
          +'<button class="mini" data-cp="'+esc(url)+'">Kopieer link</button>'
          +(x.status==='ondertekend'?'<a class="mini" href="'+API+'?action=pdf&code='+x.code+'" target="_blank">PDF</a>':'')
        +'</td></tr>';
    }).join('');
    el.innerHTML='<table><thead><tr><th>Adres</th><th>Status</th><th>Opdrachtgever</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    el.querySelectorAll('[data-cp]').forEach(function(btn){btn.onclick=function(){navigator.clipboard.writeText(btn.getAttribute('data-cp')).then(function(){btn.textContent='Gekopieerd';});};});
  });
}

/* ---------- TEKEN-PAGINA ---------- */
var signaturePad=null;
function renderSign(code){
  api('order&code='+code).then(function(r){
    if(r.status!==200||!r.json.order){ app.innerHTML=brand+'<div class="card narrow center"><h1>Link ongeldig</h1><p class="lead">Deze link is niet (meer) geldig. Vraag de adviseur om een nieuwe.</p></div>'; return; }
    var d=r.json.order; buildSign(code,d);
  }).catch(function(){ app.innerHTML=brand+'<div class="card narrow center"><h1>Er ging iets mis</h1><p class="lead">Probeer de link later opnieuw.</p></div>'; });
}
function buildSign(code,d){
  var rows=CHECKLIST.map(function(c){return '<label class="opt-row" style="'+(c.indent?'padding-left:24px':'')+'"><input type="checkbox" data-k="'+c.k+'"><span>'+esc(c.t)+'</span></label>';}).join('');
  app.innerHTML=brand
   +'<div class="card narrow"><h1>Opdrachtbevestiging</h1><p class="lead">'+esc(d.adres)+(d.postcode||d.woonplaats?(' · '+esc((d.postcode||'')+' '+(d.woonplaats||''))):'')+'</p>'
   +'<div class="alert"><span>Zonder ondertekening kan uw energielabel niet worden afgemeld.</span></div>'
   +'<label class="fld">Naam opdrachtgever</label><input id="naam" type="text" placeholder="Voor- en achternaam">'
   +'<label class="fld">Bedrijfsnaam <span class="opt">— optioneel</span></label><input id="bedrijf" type="text" placeholder="Makelaarskantoor">'
   +'<label class="fld">Adres opname energielabel</label><input id="adres" type="text" value="'+esc(d.adres||'')+'">'
   +'<div class="row"><div><label class="fld">Postcode</label><input id="postcode" type="text" value="'+esc(d.postcode||'')+'"></div>'
   +'<div><label class="fld">Woonplaats</label><input id="woonplaats" type="text" value="'+esc(d.woonplaats||'')+'"></div></div>'
   +'<button class="disc" id="disc" type="button"><span><span class="t">Beschikbare informatie toevoegen</span><span class="sub">Optioneel — helpt de adviseur</span></span>'+CHEV+'</button>'
   +'<div class="panel" id="panel"><div style="padding:6px 2px">'+rows+'<label class="opt-row none"><input type="checkbox" id="geen"><span>Geen van bovenstaande informatie beschikbaar.</span></label></div></div>'
   +'<label class="fld" style="margin-bottom:0">Uw handtekening <button class="clear" id="clr" type="button">Wissen</button></label>'
   +'<div class="sigbox"><canvas id="sig"></canvas><div class="baseline"></div><div class="sighint" id="hint">Teken hier met vinger of muis</div></div>'
   +'<p class="muted" style="margin-top:8px">De datum wordt automatisch ingevuld bij ondertekenen.</p>'
   +'<div class="err" id="err"></div><button class="btn" id="submit">Onderteken &amp; verstuur</button></div>';
  var disc=document.getElementById('disc'),panel=document.getElementById('panel');
  disc.onclick=function(){disc.classList.toggle('open');panel.classList.toggle('open');};
  var c=document.getElementById('sig');resizeCanvas(c);window.addEventListener('resize',function(){resizeCanvas(c);});
  signaturePad=new SignaturePad(c,{penColor:'#1f2937',minWidth:0.9,maxWidth:2.4});
  signaturePad.addEventListener('beginStroke',function(){document.getElementById('hint').style.display='none';});
  document.getElementById('clr').onclick=function(){signaturePad.clear();document.getElementById('hint').style.display='block';};
  document.getElementById('geen').addEventListener('change',function(e){if(e.target.checked)document.querySelectorAll('#panel input[data-k]').forEach(function(i){i.checked=false;});});
  document.querySelectorAll('#panel input[data-k]').forEach(function(i){i.addEventListener('change',function(e){if(e.target.checked)document.getElementById('geen').checked=false;});});
  document.getElementById('submit').onclick=function(){submitSign(code);};
}
function submitSign(code){
  var err=document.getElementById('err');var naam=val('naam'),adres=val('adres');
  if(!naam)return fail(err,'Vul uw naam in.');
  if(!adres)return fail(err,'Vul het adres in.');
  if(!signaturePad||signaturePad.isEmpty())return fail(err,'Plaats uw handtekening.');
  var checked={};document.querySelectorAll('#panel input[data-k]').forEach(function(i){if(i.checked)checked[i.dataset.k]=true;});
  var b=document.getElementById('submit');b.disabled=true;b.textContent='Bezig met verzenden…';
  api('sign',{method:'POST',body:{code:code,naam:naam,bedrijf:val('bedrijf'),adres:adres,postcode:val('postcode'),woonplaats:val('woonplaats'),checked:checked,geen:document.getElementById('geen').checked,signature:signaturePad.toDataURL('image/png')}}).then(function(r){
    if(r.status!==200){b.disabled=false;b.textContent='Onderteken & verstuur';return fail(err,(r.json&&r.json.error)||'Versturen mislukt.');}
    app.innerHTML=brand+'<div class="card narrow center"><h1>Het is gelukt</h1><p class="lead">Bedankt '+esc(naam.split(' ')[0])+'. Uw opdrachtbevestiging is rechtsgeldig ondertekend en naar de adviseur verstuurd.</p></div>';
    window.scrollTo({top:0});
  }).catch(function(){b.disabled=false;b.textContent='Onderteken & verstuur';fail(err,'Versturen mislukt. Probeer opnieuw.');});
}

function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function show(id){document.getElementById(id).style.display='block';}
function fail(el,m){el.textContent=m;el.style.display='block';el.scrollIntoView({block:'center',behavior:'smooth'});}
function resizeCanvas(c){var r=Math.max(window.devicePixelRatio||1,1);var b=c.getBoundingClientRect();c.width=Math.max(1,b.width*r);c.height=200*r;var x=c.getContext('2d');x.setTransform(1,0,0,1,0,0);x.scale(r,r);if(signaturePad)signaturePad.clear();}
</script>
</body>
</html>
